{% extends "base.html" %}

{% block title %}Add Skill - Skill Decay Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">Add New Skill</h1>
        
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('add_skill') }}">
                    <div class="mb-3">
                        <label for="skill_name" class="form-label">Skill Name</label>
                        <input type="text" class="form-control" id="skill_name" name="skill_name" 
                               placeholder="e.g., Python, React, Docker" required>
                        <small class="text-muted">What skill do you want to track?</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="level" class="form-label">Current Level</label>
                        <select class="form-select" id="level" name="level">
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="learning_date" class="form-label">When did you start learning this?</label>
                        <input type="date" class="form-control" id="learning_date" name="learning_date" required>
                        <small class="text-muted">This helps calculate skill decay</small>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Add Skill</button>
                        <a href="{{ url_for('skills') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
