{% extends "base.html" %}

{% block title %}Edit Skill - Skill Decay Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">Edit Skill</h1>
        
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('edit_skill', skill_id=skill.id) }}">
                    <div class="mb-3">
                        <label for="skill_name" class="form-label">Skill Name</label>
                        <input type="text" class="form-control" id="skill_name" name="skill_name" 
                               value="{{ skill.skill_name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="level" class="form-label">Current Level</label>
                        <select class="form-select" id="level" name="level">
                            <option value="Beginner" {% if skill.level == 'Beginner' %}selected{% endif %}>Beginner</option>
                            <option value="Intermediate" {% if skill.level == 'Intermediate' %}selected{% endif %}>Intermediate</option>
                            <option value="Advanced" {% if skill.level == 'Advanced' %}selected{% endif %}>Advanced</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="learning_date" class="form-label">Learning Date</label>
                        <input type="date" class="form-control" id="learning_date" name="learning_date" 
                               value="{{ skill.learning_date.strftime('%Y-%m-%d') }}" disabled>
                        <small class="text-muted">Cannot be changed</small>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{{ url_for('skill_detail', skill_id=skill.id) }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
