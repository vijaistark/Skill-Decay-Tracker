{% extends "navigation_base.html" %}

{% block title %}Add Skill - Skill Decay Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h3 class="mb-4">Add Skill</h3>
                <form method="POST" action="{% url 'add_skill' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="skill_name" class="form-label">Skill Name</label>
                        <input type="text" class="form-control" id="skill_name" name="skill_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="level" class="form-label">Level</label>
                        <select class="form-select" id="level" name="level">
                            <option>Beginner</option>
                            <option>Intermediate</option>
                            <option>Advanced</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="learning_date" class="form-label">Learning Date</label>
                        <input type="date" class="form-control" id="learning_date" name="learning_date" required>
                    </div>
                    <button class="btn btn-primary">Add Skill</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
